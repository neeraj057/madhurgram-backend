# MadhurGram Nginx Load Balancer / Server Configuration Guide
# This configuration demonstrates how to serve a custom 503 maintenance page during server updates.

server {
    listen 80;
    server_name madhurgram.com www.madhurgram.com;

    # Root directory for static assets
    root /var/www/madhurgram;
    index index.html;

    # 1. DEFINE CUSTOM 503 ERROR PAGE
    error_page 503 @maintenance;

    # 2. TRIGGER MAINTENANCE MODE
    # To toggle maintenance mode, create a file called 'maintenance.enable' in your root folder:
    # command: touch /var/www/madhurgram/maintenance.enable
    # To disable maintenance mode:
    # command: rm /var/www/madhurgram/maintenance.enable
    
    if (-f $document_root/maintenance.enable) {
        # Allow administrators access to admin routes during maintenance
        set $maintenance_allowed 0;
        
        # Bypasses admin paths (e.g. /admin or /api/admin)
        if ($request_uri ~* "^/admin" ) {
            set $maintenance_allowed 1;
        }
        if ($request_uri ~* "^/api/admin" ) {
            set $maintenance_allowed 1;
        }
        
        # If not admin, return 503 Service Unavailable
        if ($maintenance_allowed = 0) {
            return 503;
        }
    }

    # 3. INTERCEPT 503 ERRORS AND RENDER PAGE
    location @maintenance {
        # Points to the static html template
        rewrite ^(.*)$ /503_maintenance.html break;
    }

    # Standard Frontend reverse proxy config
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Standard Backend API reverse proxy config
    location /api {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
