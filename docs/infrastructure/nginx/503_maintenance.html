<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadhurGram - Scheduled Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0A0A0A;
            background-image: radial-gradient(circle at 50% 50%, #1a150e 0%, #0A0A0A 70%);
            color: #FDFBF7;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-hidden: relative;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            padding: 50px 40px;
            background: rgba(22, 22, 22, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(212, 175, 55, 0.03);
            animation: fadeIn 1s ease-out;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #FDFBF7;
        }

        .logo span {
            color: #D4AF37;
        }

        .icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.3);
            animation: pulse 2s infinite ease-in-out;
        }

        .icon {
            font-size: 2.5rem;
            animation: rotate 10s infinite linear;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #FDFBF7;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        h1 span {
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: linear-gradient(to right, #FDFBF7, #D4AF37, #FDFBF7);
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: #A3A3A3;
            line-height: 1.7;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            width: 100px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            margin: 0 auto 35px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 400;
            color: #D4AF37;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.2); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 20px 8px rgba(212, 175, 55, 0.15); }
            100% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 24px;
                border-radius: 24px;
            }
            h1 {
                font-size: 1.8rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            Madhur<span>Gram</span>
        </div>
        
        <div class="icon-wrapper">
            <div class="icon-glow"></div>
            <div class="icon">✨</div>
        </div>

        <h1>🔧 <span>Under Maintenance</span></h1>
        
        <p>
            गोपीगंज के पारंपरिक बिलोना कारीगर और हमारी टेक्निकल टीम वेबसाइट को और बेहतर बनाने के लिए काम कर रहे हैं। हम बहुत जल्द शुद्धता के नए स्वाद के साथ वापस आएंगे।
        </p>

        <div class="divider"></div>

        <div class="contact-info">
            <a href="tel:+919876543210" class="contact-card">📞 Call Us</a>
            <a href="mailto:support@madhurgram.com" class="contact-card">✉️ Email Support</a>
        </div>
    </div>
</body>
</html>
