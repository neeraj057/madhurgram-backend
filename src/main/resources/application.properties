spring.application.name=product-service

# MySQL Connection Settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/madhurgram_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Neeraj@057}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT and Twilio Settings
jwt.secret=${JWT_SECRET:defaultdevsecretkeymustbe32characterslongforhs256}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACmockaccountsdicdummyvalues12345}
twilio.auth-token=${TWILIO_AUTH_TOKEN:mockauthtokendummyvalues12345678}
twilio.from-number=${TWILIO_FROM_NUMBER:+1234567890}

# Secure Admin Credentials
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:MadhurGram@2026}

# Redis Cache Settings
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Abandoned Cart Expiry & Retention (in hours)
madhurgram.cart.retention-hours=48

# Spring Boot Actuator and Prometheus Monitoring Settings
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Multipart Upload Settings (Increase file upload size limits to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

